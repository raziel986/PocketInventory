<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketITCheck - Inventory | Diagnostics | Maintenance | Repairs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- React & Babel CDNs (Zero-Build) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (React Version) -->
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>

    <link rel="stylesheet" href="index.css">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PocketInv">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
    <link rel="manifest" href="manifest.json">

    <!-- Librerías para Generación de PDF y UI Utilities -->
    <script src="libs/jspdf.umd.min.js" defer></script>
    <script src="libs/jspdf-autotable.min.js" defer></script>
    <script src="libs/sweetalert2.all.min.js" defer></script>

    <style>
        #root { min-height: 100vh; }
        .splash-hidden { opacity: 0; visibility: hidden; transition: all 0.5s ease; }
    </style>
</head>

<body>


    <div id="root">
        <!-- Splash Screen de Precarga -->
        <div id="splash-screen">
            <div style="text-align: center; font-family: 'Outfit', sans-serif;">
                <div style="width: 60px; height: 60px; border: 4px solid #f1f5f9; border-top: 4px solid #4f46e5; border-radius: 50%; margin: 0 auto 1.5rem; animation: spin 1s linear infinite;"></div>
                <div style="font-size: 1.5rem; font-weight: 700; color: #4f46e5; margin-bottom: 0.5rem;">PocketITCheck</div>
                <div style="font-size: 0.85rem; color: #64748b;">Iniciando React...</div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Contenedor Lateral (Sidebar) -->
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- React App Entry Point (Zero-Build using Babel standalone) -->
    <script type="text/babel" data-type="module" src="js/react-app.js"></script>
</body>
</html>
